<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ventus</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ventus">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<!-- 랜딩 페이지 -->
<div class="page" id="pageLanding">
  <div class="landing-tap-zone" onclick="showChecklist()"></div>
</div>

<!-- 체크리스트 페이지 --><div class="page hidden" id="pageChecklist">
  <div class="cl-wrap">

    <!-- 1. Hero Section -->
    <section class="cl-hero">
      <div class="cl-hero-nav">
        <button class="cl-back" onclick="hideChecklist()">
          <i class="ph ph-arrow-left"></i>
          <span>돌아가기</span>
        </button>
        <button class="cl-reset-top" id="clResetTopBtn" type="button">
          <i class="ph ph-arrow-counter-clockwise"></i>
          <span>초기화</span>
        </button>
      </div>

      <div class="cl-hero-content">
        <h1>유형 체크지</h1>
        <p>각 문항을 <strong>1~5점</strong>으로 체크하면<br>상위 유형이 자동으로 계산됩니다.</p>
      </div>

      <div class="cl-legend">
        <span class="legend-item"><i class="ph-fill ph-number-circle-one"></i> 전혀 아님</span>
        <span class="legend-divider"></span>
        <span class="legend-item"><i class="ph-fill ph-number-circle-three"></i> 보통</span>
        <span class="legend-divider"></span>
        <span class="legend-item"><i class="ph-fill ph-number-circle-five"></i> 매우 맞음</span>
      </div>
    </section>

    <!-- 2. Meta Section (Bento Grid Style) -->
    <section class="cl-meta">
      <div class="cl-field field-full">
        <label for="clCheckDate"><i class="ph ph-calendar-blank"></i> 일시</label>
        <input id="clCheckDate" type="datetime-local">
      </div>
      <div class="cl-field">
        <label for="clUserName"><i class="ph ph-user"></i> 이름</label>
        <input id="clUserName" type="text" placeholder="이름 입력">
      </div>
      <div class="cl-field">
        <label for="clMbti"><i class="ph ph-brain"></i> MBTI</label>
        <input id="clMbti" type="text" placeholder="예: INFP">
      </div>
      <div class="cl-field field-result field-full">
        <label for="clSeedResult"><i class="ph ph-sparkle"></i> 상위 유형 (자동 계산)</label>
        <input id="clSeedResult" type="text" placeholder="아직 데이터가 부족해요" readonly>
      </div>
    </section>

    <!-- 3. Sticky Topbar (Glassmorphism) -->
    <div class="cl-topbar">
      <div class="cl-progress-card">
        <div class="cl-progress-info">
          <div class="progress-text">
            <i class="ph ph-check-circle"></i>
            <strong id="clProgressText">진행률</strong>
          </div>
          <span id="clPercentText">0%</span>
        </div>
        <div class="cl-bar"><span id="clProgressBar"></span></div>
        <div class="cl-badge-row">
          <span class="cl-mini"><i class="ph ph-cloud-check"></i> 자동 저장중</span>
          <span class="cl-mini"><i class="ph ph-calculator"></i> 실시간 계산중</span>
        </div>
      </div>
    </div>

    <!-- 4. Main Questions Area -->
    <main id="clSections"></main>

    <!-- 5. Actions Area -->
    <div class="cl-actions">
      <button class="cl-btn-main" id="clSubmitBtn" type="button">
        결과 제출하기 <i class="ph ph-paper-plane-right"></i>
      </button>
      <button class="cl-btn-sub" id="clResetBtn" type="button">
        <i class="ph ph-arrow-counter-clockwise"></i> 초기화
      </button>
    </div>

  </div>

  <button class="cl-fab-top" id="clTopBtn" type="button" aria-label="맨 위로">
    <i class="ph ph-arrow-up"></i>
  </button>
</div>

<!-- 체크리스트 결과 차트 -->
<div class="cl-chart-overlay" id="clChartModal">
  <div class="cl-chart-sheet">
    <div class="cl-chart-header">
      <div class="cl-chart-title"> Ventus 체크리스트 결과</div>
    </div>
    <div class="cl-chart-canvas-wrap">
      <canvas id="clRadarChart"></canvas>
    </div>
    <div class="cl-chart-rank" id="clChartRank"></div>
    <div class="cl-chart-btns">
      <button class="cl-chart-btn-sub" id="clChartCloseBtn">처음으로</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
